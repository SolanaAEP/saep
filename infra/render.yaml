databases:
  - name: saep-postgres
    plan: starter
    postgresMajorVersion: "16"

services:
  - type: keyvalue
    name: saep-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: saep-iacp
    env: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @saep/iacp build
    startCommand: pnpm --filter @saep/iacp start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: saep-redis
          property: connectionString

  - type: worker
    name: saep-proof-gen
    env: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @saep/proof-gen build
    startCommand: pnpm --filter @saep/proof-gen start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: saep-redis
          property: connectionString

  - type: worker
    name: saep-indexer
    env: docker
    plan: starter
    dockerfilePath: services/indexer/Dockerfile
    envVars:
      - key: INDEXER_ROLE
        value: poller
      - key: DATABASE_URL
        fromDatabase:
          name: saep-postgres
          property: connectionString
      - key: HELIUS_API_KEY
        sync: false
      - key: HELIUS_YELLOWSTONE_ENDPOINT
        sync: false

  - type: web
    name: saep-indexer-api
    env: docker
    plan: starter
    dockerfilePath: services/indexer/Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: INDEXER_ROLE
        value: api
      - key: DATABASE_URL
        fromDatabase:
          name: saep-postgres
          property: connectionString
      - key: HEALTHCHECK_PORT
        value: "10001"
      - key: API_PORT
        value: "10000"
      - key: CORS_ORIGINS
        value: "https://app.buildonsaep.com,https://saep-app.onrender.com"
