name: Audit finding tracking
description: Track a finding from an internal or external audit report. Maintainers only.
labels: ["audit", "security"]
title: "[Audit] <short finding description>"
body:
  - type: markdown
    attributes:
      value: |
        **Use this template only for findings that are already public (external report published) or internal findings that do not represent an exploitable vulnerability.** Critical and High findings from a live audit are tracked privately via GitHub Security Advisories.

  - type: input
    id: audit_source
    attributes:
      label: Audit source
      placeholder: "OtterSec M1, Neodyme M2, internal pre-audit, etc."
    validations:
      required: true

  - type: input
    id: finding_id
    attributes:
      label: Finding ID
      description: As assigned by the auditor, e.g. "OS-SAEP-01".
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
        - Informational
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true

  - type: textarea
    id: affected
    attributes:
      label: Affected code
      description: Files, functions, commit hash.
    validations:
      required: true

  - type: textarea
    id: remediation
    attributes:
      label: Planned remediation

  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Accepted, fix pending
        - Fix in progress
        - Fixed, awaiting retest
        - Retest passed
        - Risk accepted (with rationale)
        - Disputed
    validations:
      required: true
