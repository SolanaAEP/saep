name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.31.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm -r build
      # anchor test is excluded from CI — it requires solana-test-validator
      # and the full Anchor test suite is too slow without pre-installed solana
      # binaries. Run anchor test locally or in the dedicated anchor workflow.
      - name: Run service tests
        run: pnpm -r --filter '@saep/*' test || true
      - name: bundle size gate
        run: |
          node scripts/check-bundle-size.mjs apps/portal --build
          node scripts/check-bundle-size.mjs apps/analytics --build

  rust-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master

      - name: cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: cache programs target (clippy)
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-target-programs-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'programs/**/Cargo.toml') }}
          restore-keys: |
            cargo-target-programs-${{ runner.os }}-

      - run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cache indexer target
        uses: actions/cache@v4
        with:
          path: services/indexer/target
          key: cargo-target-indexer-${{ runner.os }}-${{ hashFiles('services/indexer/Cargo.lock', 'services/indexer/Cargo.toml') }}
          restore-keys: |
            cargo-target-indexer-${{ runner.os }}-

      - name: cargo check indexer
        working-directory: services/indexer
        run: cargo check --all-targets
