name: security-scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
      - name: cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.22.1-${{ runner.os }}
      - name: install cargo-audit
        run: |
          if ! command -v cargo-audit >/dev/null; then
            cargo install cargo-audit --locked --version 0.22.1
          fi
      - name: cargo audit (root + indexer, baselined)
        run: ./scripts/audit.sh

  pnpm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.31.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high || true

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.157.0
    steps:
      - uses: actions/checkout@v4
      - name: semgrep scan (solana + p/rust, baseline-annotated)
        run: semgrep scan --error --config=.semgrep/solana.yml --config=p/rust --metrics=off programs/
